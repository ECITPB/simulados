<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploradores do Conhecimento 🚀</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #f59e0b;
            --bg-body: #0f172a; /* Fundo escuro para destacar as cores */
            --card-front-bg: #ffffff;
            --card-back-bg: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-main: #1e293b;
            --success: #22c55e;
            --danger: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 900px;
            z-index: 10;
        }

        h1 { 
            font-size: 3.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            font-weight: 900;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.3));
        }

        .controls {
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow);
        }

        .control-group label { color: #e2e8f0; }

        select {
            padding: 12px 20px;
            border-radius: 14px;
            border: none;
            background: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            transition: transform 0.2s;
        }

        select:hover { transform: scale(1.05); }

        .stats-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        .stat-item span { color: #818cf8; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1100px;
            perspective: 1000px;
            padding: 20px;
        }

        .card {
            height: 110px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover { transform: rotateY(10deg) translateY(-10px); }
        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .card-back { 
            background: var(--card-back-bg); 
            color: white; 
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card-front {
            background: #fff;
            color: var(--primary);
            transform: rotateY(180deg);
            border: 4px solid var(--primary);
        }

        .card.used { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        /* MODAL ANIMADO */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 35px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: var(--text-main);
            position: relative;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .option-btn {
            padding: 18px;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            background: #f8fafc;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .option-btn:hover { background: #e2e8f0; transform: translateX(5px); }

        .close-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
        }

        /* EMOJIS DANÇANTES */
        .floating-emoji {
            position: fixed;
            font-size: 80px;
            pointer-events: none;
            z-index: 2000;
            animation: dance 2s ease-out forwards;
        }

        @keyframes dance {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translateY(20vh) rotate(20deg) scale(1.5); }
            100% { transform: translateY(-100vh) rotate(-20deg) scale(1.2); opacity: 0; }
        }

        .no-more-msg {
            background: #ef4444;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .grid-container { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

        let perguntasUsadasIndices = [];
        const totalCards = 80;
        const grid = document.getElementById('grid');

        function init() {
            createGrid();
            updateStats();
        }

        function spawnEmoji(type) {
            const emojis = type === 'win' ? ['🥳', '🎉', '✨', '🏆', '🤩'] : ['😢', '💥', '👎', '💔', '😵'];
            for(let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'floating-emoji';
                    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 90 + 'vw';
                    el.style.animationDuration = (Math.random() * 2 + 1) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 2500);
                }, i * 100);
            }
        }

        function resetGame() {
            perguntasUsadasIndices = [];
            grid.innerHTML = '';
            document.getElementById('alert-msg').style.display = 'none';
            createGrid();
            updateStats();
        }

        function getPerguntasFiltradas() {
            const tema = document.getElementById('tema-selector').value;
            if (tema === "GERAIS") return bancoPerguntas;
            return bancoPerguntas.filter(p => p.categoria === "GEOGRAFIA");
        }

        function updateStats() {
            const filtradas = getPerguntasFiltradas();
            const disponiveis = filtradas.filter(p => !perguntasUsadasIndices.includes(p.pergunta));
            document.getElementById('total-db').innerText = filtradas.length;
            document.getElementById('avail-db').innerText = disponiveis.length;
        }

        function createGrid() {
            for (let i = 1; i <= totalCards; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-face card-back">${i}</div>
                    <div class="card-face card-front">🚀</div>
                `;
                card.onclick = () => handleCardClick(card);
                grid.appendChild(card);
            }
        }

        function handleCardClick(cardElement) {
            if (cardElement.classList.contains('flipped')) return;

            const chancePunicao = parseFloat(document.getElementById('punicao-selector').value);
            
            if (Math.random() < chancePunicao) {
                const objPunicao = { categoria: "PUNIÇÃO", pergunta: "BUM! VOCÊ PERDEU PONTO! ⚠️", punicao: true };
                cardElement.classList.add('flipped', 'used');
                showQuestion(objPunicao);
                spawnEmoji('lose');
                return;
            }

            const filtradas = getPerguntasFiltradas();
            const disponiveis = filtradas.filter(p => !perguntasUsadasIndices.includes(p.pergunta));

            if (disponiveis.length === 0) {
                document.getElementById('alert-msg').style.display = 'block';
                return;
            }

            const sorteada = disponiveis[Math.floor(Math.random() * disponiveis.length)];
            perguntasUsadasIndices.push(sorteada.pergunta);
            cardElement.classList.add('flipped', 'used');
            showQuestion(sorteada);
            updateStats();
        }

        function showQuestion(obj) {
            const modal = document.getElementById('modal-overlay');
            const qText = document.getElementById('modal-question-text');
            const oBox = document.getElementById('options-box');
            
            oBox.innerHTML = '';

            if (obj.punicao) {
                qText.innerHTML = `<span style="font-size: 4rem;">💥</span><br><b style="color:#ef4444">${obj.pergunta}</b>`;
            } else {
                qText.innerHTML = `<small style="color: var(--primary)">${obj.categoria}</small><br>${obj.pergunta}`;
                obj.opcoes.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        if (index === obj.correta) {
                            btn.style.background = '#22c55e';
                            btn.style.color = 'white';
                            btn.style.borderColor = '#16a34a';
                            spawnEmoji('win');
                     } else {
    btn.style.background = '#ef4444';
    btn.style.color = 'white';
    btn.style.borderColor = '#dc2626';
    spawnEmoji('lose');

    // 🔥 AQUI É A PARTE QUE VOCÊ QUER
    Array.from(oBox.children).forEach((b, i) => {
        if (i === obj.correta) {
            b.style.background = 'yellow';
            b.style.color = '#000';
            b.style.borderColor = '#eab308';
        }
    });
}
                        Array.from(oBox.children).forEach(b => b.style.pointerEvents = 'none');
                    };
                    oBox.appendChild(btn);
                });
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        init();
    </script>
